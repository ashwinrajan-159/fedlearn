<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FedLearn Volunteer Worker</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
        }
        h1 { margin-top: 0; font-size: 1.5rem; }
        p { color: var(--text-muted); line-height: 1.5; }
        .controls { margin: 1.5rem 0; }
        select {
            width: 100%;
            padding: 0.75rem;
            border-radius: 6px;
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
            margin-bottom: 1rem;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: var(--accent-hover); }
        button:disabled { background: #334155; cursor: not-allowed; }
        .log-container {
            background: #000;
            padding: 1rem;
            border-radius: 6px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--success);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Volunteer Compute</h1>
        <p>Donate your browser's idle resources to train decentralized AI models using ONNX Runtime Web.</p>
        
        <div class="controls">
            <label for="compute-level">Compute Level (Threads)</label>
            <select id="compute-level">
                <option value="1">Low (1 Thread)</option>
                <option value="2">Medium (2 Threads)</option>
                <option value="4">High (4 Threads)</option>
            </select>
            <button id="start-btn">Start Volunteering</button>
        </div>

        <div class="log-container" id="logs">
            > Ready.
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
